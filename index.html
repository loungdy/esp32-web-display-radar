<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Ultrasonic Radar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 12px;
    }

    .container {
      max-width: 950px;
      margin: auto;
      background: #0f172a;
      padding: 14px;
      border-radius: 16px;
      box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      font-size: 24px;
      margin-top: 8px;
    }

    button {
      width: 100%;
      padding: 14px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 12px;
    }

    button:active {
      background: #1d4ed8;
    }

    .status {
      text-align: center;
      margin-bottom: 12px;
      color: #22c55e;
      font-size: 16px;
    }

    .latest {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #020617;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
    }

    .card span {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .radar-box {
      background: #020617;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    canvas {
      width: 100%;
      height: 360px;
      display: block;
    }

    .table-box {
      max-height: 310px;
      overflow-y: auto;
      border-radius: 12px;
      background: #020617;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 9px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
    }

    th {
      background: #0284c7;
      position: sticky;
      top: 0;
      z-index: 2;
    }

    .near {
      color: #ef4444;
      font-weight: bold;
    }

    .medium {
      color: #facc15;
      font-weight: bold;
    }

    .far {
      color: #22c55e;
      font-weight: bold;
    }

    .no-object {
      color: #94a3b8;
    }

    @media (max-width: 600px) {
      body {
        padding: 8px;
      }

      h1 {
        font-size: 21px;
      }

      .latest {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 300px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 7px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>ESP32 Ultrasonic Radar</h1>

    <button onclick="connectBLE()">Connect Bluetooth</button>

    <div class="status" id="connectionStatus">
      Status: Not connected
    </div>

    <div class="latest">
      <div class="card">
        Angle
        <span id="latestAngle">--</span>
      </div>

      <div class="card">
        Distance
        <span id="latestDistance">--</span>
      </div>

      <div class="card">
        Status
        <span id="latestStatus">--</span>
      </div>
    </div>

    <div class="radar-box">
      <canvas id="radarCanvas"></canvas>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Time</th>
            <th>Angle</th>
            <th>Distance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>
  </div>

  <script>
    const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
    const CHARACTERISTIC_UUID = "abcd1234-5678-90ab-cdef-1234567890ab";

    const MAX_DISTANCE = 100;
    const MAX_TABLE_ROWS = 40;

    let rowCount = 0;

    let targetAngle = 90;
    let displayAngle = 90;
    let latestDistance = -1;
    let latestStatus = "No Object";

    let lastTableUpdate = 0;
    let lastDataForTable = null;

    const canvas = document.getElementById("radarCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);
    resizeCanvas();

    async function connectBLE() {
      try {
        document.getElementById("connectionStatus").innerText =
          "Status: Searching Bluetooth...";

        const device = await navigator.bluetooth.requestDevice({
          filters: [
            { namePrefix: "ESP32-Ultrasonic-Radar" }
          ],
          optionalServices: [SERVICE_UUID]
        });

        document.getElementById("connectionStatus").innerText =
          "Status: Connecting...";

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        await characteristic.startNotifications();

        characteristic.addEventListener(
          "characteristicvaluechanged",
          handleRadarData
        );

        document.getElementById("connectionStatus").innerText =
          "Status: Connected to " + device.name;

        device.addEventListener("gattserverdisconnected", () => {
          document.getElementById("connectionStatus").innerText =
            "Status: Disconnected";
        });

      } catch (error) {
        document.getElementById("connectionStatus").innerText =
          "Status: Bluetooth connection failed";

        console.error(error);
      }
    }

    function handleRadarData(event) {
      const decoder = new TextDecoder("utf-8");
      const text = decoder.decode(event.target.value);

      try {
        const data = JSON.parse(text);

        targetAngle = Number(data.angle);
        latestDistance = Number(data.distance);
        latestStatus = data.status;

        document.getElementById("latestAngle").innerText = targetAngle + "°";

        if (latestDistance >= 0) {
          document.getElementById("latestDistance").innerText =
            latestDistance.toFixed(1) + " cm";
        } else {
          document.getElementById("latestDistance").innerText =
            "No Object";
        }

        document.getElementById("latestStatus").innerText = latestStatus;

        lastDataForTable = {
          angle: targetAngle,
          distance: latestDistance,
          status: latestStatus
        };

      } catch (error) {
        console.log("Invalid data:", text);
      }
    }

    function addTableRow(angle, distance, status) {
      rowCount++;

      const table = document.getElementById("dataTable");
      const row = table.insertRow(0);
      const time = new Date().toLocaleTimeString();

      let statusClass = "no-object";

      if (status === "Very Near" || status === "Near") {
        statusClass = "near";
      } else if (status === "Medium") {
        statusClass = "medium";
      } else if (status === "Far") {
        statusClass = "far";
      }

      row.innerHTML = `
        <td>${rowCount}</td>
        <td>${time}</td>
        <td>${angle}°</td>
        <td>${distance >= 0 ? distance.toFixed(1) + " cm" : "No Object"}</td>
        <td class="${statusClass}">${status}</td>
      `;

      while (table.rows.length > MAX_TABLE_ROWS) {
        table.deleteRow(table.rows.length - 1);
      }
    }

    function drawRadar() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      ctx.clearRect(0, 0, width, height);

      const centerX = width / 2;
      const centerY = height - 18;
      const radius = Math.min(width * 0.45, height * 0.86);

      // Smooth angle movement
      displayAngle += (targetAngle - displayAngle) * 0.22;

      // Background fade
      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, width, height);

      // Radar arcs
      ctx.strokeStyle = "#166534";
      ctx.lineWidth = 1.5;

      for (let r = radius / 4; r <= radius; r += radius / 4) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, r, Math.PI, 2 * Math.PI);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        const cm = Math.round((r / radius) * MAX_DISTANCE);
        ctx.fillText(cm + "cm", centerX + r - 34, centerY - 6);
      }

      // Angle lines
      for (let a = 0; a <= 180; a += 30) {
        const rad = (180 - a) * Math.PI / 180;
        const x = centerX + radius * Math.cos(rad);
        const y = centerY - radius * Math.sin(rad);

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        ctx.fillText(a + "°", x - 10, y - 5);
      }

      // Sweep line
      const scanRad = (180 - displayAngle) * Math.PI / 180;
      const scanX = centerX + radius * Math.cos(scanRad);
      const scanY = centerY - radius * Math.sin(scanRad);

      const gradient = ctx.createLinearGradient(centerX, centerY, scanX, scanY);
      gradient.addColorStop(0, "rgba(56,189,248,0.2)");
      gradient.addColorStop(1, "rgba(56,189,248,1)");

      ctx.strokeStyle = gradient;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(scanX, scanY);
      ctx.stroke();

      // Object point
      if (latestDistance >= 0 && latestDistance <= MAX_DISTANCE) {
        const objectRadius = map(latestDistance, 0, MAX_DISTANCE, 0, radius);
        const objectX = centerX + objectRadius * Math.cos(scanRad);
        const objectY = centerY - objectRadius * Math.sin(scanRad);

        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(objectX, objectY, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.beginPath();
        ctx.arc(objectX, objectY, 15, 0, Math.PI * 2);
        ctx.strokeStyle = "rgba(239,68,68,0.5)";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = "14px Arial";
        ctx.fillText(latestDistance.toFixed(1) + " cm", objectX + 12, objectY);
      }

      // Top info
      ctx.fillStyle = "#ffffff";
      ctx.font = "16px Arial";

      let distanceText = latestDistance >= 0
        ? latestDistance.toFixed(1) + " cm"
        : "No Object";

      ctx.fillText(
        "Angle: " + Math.round(targetAngle) + "°    Distance: " + distanceText,
        14,
        24
      );
    }

    function updateTableSlowly() {
      const now = Date.now();

      if (lastDataForTable && now - lastTableUpdate > 300) {
        addTableRow(
          lastDataForTable.angle,
          lastDataForTable.distance,
          lastDataForTable.status
        );

        lastTableUpdate = now;
        lastDataForTable = null;
      }
    }

    function animate() {
      drawRadar();
      updateTableSlowly();
      requestAnimationFrame(animate);
    }

    function map(value, inMin, inMax, outMin, outMax) {
      return (value - inMin) * (outMax - outMin) /
             (inMax - inMin) + outMin;
    }

    animate();
  </script>

</body>
</html>
