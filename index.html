<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>ESP32 Ultrasonic Radar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020617;
      color: white;
      padding: 10px;
    }

    .container {
      max-width: 950px;
      margin: auto;
      background: #0f172a;
      padding: 14px;
      border-radius: 16px;
    }

    h1 {
      text-align: center;
      color: #38bdf8;
      font-size: 24px;
      margin: 8px 0 14px;
    }

    .btn-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 12px;
    }

    button {
      padding: 14px;
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 17px;
      font-weight: bold;
      touch-action: manipulation;
      cursor: pointer;
    }

    .connect-btn {
      background: #2563eb;
    }

    .clear-btn {
      background: #dc2626;
    }

    .status {
      text-align: center;
      margin-bottom: 12px;
      color: #22c55e;
      font-size: 16px;
    }

    .latest {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 12px;
    }

    .card {
      background: #020617;
      padding: 12px;
      border-radius: 12px;
      text-align: center;
      font-size: 14px;
      color: #cbd5e1;
    }

    .card span {
      display: block;
      margin-top: 6px;
      font-size: 22px;
      color: #38bdf8;
      font-weight: bold;
    }

    .radar-box {
      background: #020617;
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    canvas {
      width: 100%;
      height: 360px;
      display: block;
    }

    .table-box {
      border-radius: 12px;
      background: #020617;
      overflow: hidden;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
    }

    th, td {
      padding: 9px;
      text-align: center;
      border-bottom: 1px solid #1e293b;
    }

    th {
      background: #0284c7;
    }

    .near {
      color: #ef4444;
      font-weight: bold;
    }

    .medium {
      color: #facc15;
      font-weight: bold;
    }

    .far {
      color: #22c55e;
      font-weight: bold;
    }

    .no-object {
      color: #94a3b8;
    }

    .hint {
      margin-top: 12px;
      text-align: center;
      color: #94a3b8;
      font-size: 13px;
    }

    @media (max-width: 600px) {
      .btn-row {
        grid-template-columns: 1fr;
      }

      .latest {
        grid-template-columns: 1fr;
      }

      canvas {
        height: 300px;
      }

      table {
        font-size: 12px;
      }

      th, td {
        padding: 7px;
      }
    }
  </style>
</head>

<body>

  <div class="container">
    <h1>ESP32 Ultrasonic Radar</h1>

    <div class="btn-row">
      <button class="connect-btn" onclick="connectBLE()">Connect Bluetooth</button>
      <button class="clear-btn" onclick="clearData()">Clear Data</button>
    </div>

    <div class="status" id="connectionStatus">
      Status: Not connected
    </div>

    <div class="latest">
      <div class="card">
        Angle
        <span id="latestAngle">--</span>
      </div>

      <div class="card">
        Distance
        <span id="latestDistance">--</span>
      </div>

      <div class="card">
        Status
        <span id="latestStatus">--</span>
      </div>
    </div>

    <div class="radar-box">
      <canvas id="radarCanvas"></canvas>
    </div>

    <div class="table-box">
      <table>
        <thead>
          <tr>
            <th>No.</th>
            <th>Time</th>
            <th>Angle</th>
            <th>Distance</th>
            <th>Status</th>
          </tr>
        </thead>
        <tbody id="dataTable"></tbody>
      </table>
    </div>

    <div class="hint">
      Use Android Chrome with HTTPS hosting. iPhone Safari/Chrome usually cannot use Web Bluetooth.
    </div>
  </div>

  <script>
    const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
    const CHARACTERISTIC_UUID = "abcd1234-5678-90ab-cdef-1234567890ab";

    const MAX_DISTANCE = 120;
    const MAX_TABLE_ROWS = 10;

    let rowCount = 0;

    let targetAngle = 90;
    let displayAngle = 90;

    let rawDistance = -1;
    let smoothDistance = -1;

    let latestStatusCode = 0;
    let latestStatusText = "No Object";

    let lastTableUpdate = 0;
    let lastTableData = null;

    const canvas = document.getElementById("radarCanvas");
    const ctx = canvas.getContext("2d");

    function resizeCanvas() {
      const dpr = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();

      canvas.width = rect.width * dpr;
      canvas.height = rect.height * dpr;

      ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
    }

    window.addEventListener("resize", resizeCanvas);

    setTimeout(resizeCanvas, 100);

    async function connectBLE() {
      if (!navigator.bluetooth) {
        document.getElementById("connectionStatus").innerText =
          "Status: Web Bluetooth not supported. Use Android Chrome.";
        return;
      }

      try {
        document.getElementById("connectionStatus").innerText =
          "Status: Searching Bluetooth...";

        const device = await navigator.bluetooth.requestDevice({
          filters: [
            { namePrefix: "ESP32-Ultrasonic-Radar" }
          ],
          optionalServices: [SERVICE_UUID]
        });

        document.getElementById("connectionStatus").innerText =
          "Status: Connecting...";

        const server = await device.gatt.connect();
        const service = await server.getPrimaryService(SERVICE_UUID);
        const characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

        await characteristic.startNotifications();

        characteristic.addEventListener(
          "characteristicvaluechanged",
          handleRadarData
        );

        document.getElementById("connectionStatus").innerText =
          "Status: Connected to " + device.name;

        device.addEventListener("gattserverdisconnected", () => {
          document.getElementById("connectionStatus").innerText =
            "Status: Disconnected";
        });

      } catch (error) {
        document.getElementById("connectionStatus").innerText =
          "Status: Bluetooth connection failed";
        console.error(error);
      }
    }

    function statusTextFromCode(code) {
      if (code === 1) return "Very Near";
      if (code === 2) return "Near";
      if (code === 3) return "Medium";
      if (code === 4) return "Far";
      return "No Object";
    }

    function handleRadarData(event) {
      const decoder = new TextDecoder("utf-8");
      const text = decoder.decode(event.target.value).trim();

      try {
        // Supports new ESP32 CSV: angle,distance,statusCode
        if (text.includes(",")) {
          const parts = text.split(",");

          if (parts.length === 3) {
            const angle = Number(parts[0]);
            const distance = Number(parts[1]);
            const statusCode = Number(parts[2]);

            updateRadarData(angle, distance, statusCode);
            return;
          }
        }

        // Also supports old ESP32 JSON: {"angle":90,"distance":25.3,"status":"Near"}
        if (text.startsWith("{")) {
          const data = JSON.parse(text);
          const angle = Number(data.angle);
          const distance = Number(data.distance);
          let statusCode = 0;

          if (data.status === "Very Near") statusCode = 1;
          else if (data.status === "Near") statusCode = 2;
          else if (data.status === "Medium") statusCode = 3;
          else if (data.status === "Far") statusCode = 4;

          updateRadarData(angle, distance, statusCode);
        }
      } catch (error) {
        console.log("Invalid BLE data:", text);
      }
    }

    function updateRadarData(angle, distance, statusCode) {
      if (Number.isNaN(angle)) return;

      targetAngle = angle;
      rawDistance = distance;
      latestStatusCode = statusCode;
      latestStatusText = statusTextFromCode(statusCode);

      if (rawDistance >= 0) {
        if (smoothDistance < 0) {
          smoothDistance = rawDistance;
        } else {
          smoothDistance += (rawDistance - smoothDistance) * 0.35;
        }
      } else {
        smoothDistance = -1;
      }

      document.getElementById("latestAngle").innerText =
        targetAngle + "°";

      document.getElementById("latestDistance").innerText =
        smoothDistance >= 0
          ? smoothDistance.toFixed(1) + " cm"
          : "No Object";

      document.getElementById("latestStatus").innerText =
        latestStatusText;

      lastTableData = {
        angle: targetAngle,
        distance: smoothDistance,
        status: latestStatusText
      };
    }

    function addTableRow(angle, distance, status) {
      rowCount++;

      const table = document.getElementById("dataTable");
      const row = table.insertRow(0);
      const time = new Date().toLocaleTimeString();

      let statusClass = "no-object";

      if (status === "Very Near" || status === "Near") {
        statusClass = "near";
      } else if (status === "Medium") {
        statusClass = "medium";
      } else if (status === "Far") {
        statusClass = "far";
      }

      row.innerHTML = `
        <td>${rowCount}</td>
        <td>${time}</td>
        <td>${angle}°</td>
        <td>${distance >= 0 ? distance.toFixed(1) + " cm" : "No Object"}</td>
        <td class="${statusClass}">${status}</td>
      `;

      while (table.rows.length > MAX_TABLE_ROWS) {
        table.deleteRow(table.rows.length - 1);
      }
    }

    function clearData() {
      document.getElementById("dataTable").innerHTML = "";
      rowCount = 0;

      rawDistance = -1;
      smoothDistance = -1;
      latestStatusText = "No Object";

      document.getElementById("latestAngle").innerText = "--";
      document.getElementById("latestDistance").innerText = "--";
      document.getElementById("latestStatus").innerText = "--";
    }

    function drawRadar() {
      const width = canvas.clientWidth;
      const height = canvas.clientHeight;

      if (width === 0 || height === 0) return;

      ctx.clearRect(0, 0, width, height);

      const centerX = width / 2;
      const centerY = height - 18;
      const radius = Math.min(width * 0.45, height * 0.86);

      displayAngle += (targetAngle - displayAngle) * 0.08;

      ctx.fillStyle = "#020617";
      ctx.fillRect(0, 0, width, height);

      const bgGradient = ctx.createRadialGradient(
        centerX, centerY, 10,
        centerX, centerY, radius
      );
      bgGradient.addColorStop(0, "rgba(34,197,94,0.08)");
      bgGradient.addColorStop(1, "rgba(34,197,94,0.00)");

      ctx.fillStyle = bgGradient;
      ctx.beginPath();
      ctx.arc(centerX, centerY, radius, Math.PI, 2 * Math.PI);
      ctx.fill();

      ctx.strokeStyle = "rgba(34,197,94,0.45)";
      ctx.lineWidth = 1.3;

      for (let r = radius / 4; r <= radius; r += radius / 4) {
        ctx.beginPath();
        ctx.arc(centerX, centerY, r, Math.PI, 2 * Math.PI);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        const cm = Math.round((r / radius) * MAX_DISTANCE);
        ctx.fillText(cm + "cm", centerX + r - 38, centerY - 6);
      }

      for (let a = 0; a <= 180; a += 30) {
        const rad = (180 - a) * Math.PI / 180;
        const x = centerX + radius * Math.cos(rad);
        const y = centerY - radius * Math.sin(rad);

        ctx.beginPath();
        ctx.moveTo(centerX, centerY);
        ctx.lineTo(x, y);
        ctx.stroke();

        ctx.fillStyle = "#64748b";
        ctx.font = "12px Arial";
        ctx.fillText(a + "°", x - 10, y - 5);
      }

      const scanRad = (180 - displayAngle) * Math.PI / 180;
      const scanX = centerX + radius * Math.cos(scanRad);
      const scanY = centerY - radius * Math.sin(scanRad);

      ctx.strokeStyle = "rgba(56,189,248,0.18)";
      ctx.lineWidth = 14;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(scanX, scanY);
      ctx.stroke();

      const gradient = ctx.createLinearGradient(centerX, centerY, scanX, scanY);
      gradient.addColorStop(0, "rgba(56,189,248,0.05)");
      gradient.addColorStop(0.6, "rgba(56,189,248,0.6)");
      gradient.addColorStop(1, "rgba(56,189,248,1)");

      ctx.strokeStyle = gradient;
      ctx.lineWidth = 4;
      ctx.beginPath();
      ctx.moveTo(centerX, centerY);
      ctx.lineTo(scanX, scanY);
      ctx.stroke();

      if (smoothDistance >= 0 && smoothDistance <= MAX_DISTANCE) {
        const objectRadius = map(smoothDistance, 0, MAX_DISTANCE, 0, radius);
        const objectX = centerX + objectRadius * Math.cos(scanRad);
        const objectY = centerY - objectRadius * Math.sin(scanRad);

        ctx.fillStyle = "#ef4444";
        ctx.beginPath();
        ctx.arc(objectX, objectY, 8, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "rgba(239,68,68,0.65)";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(objectX, objectY, 17, 0, Math.PI * 2);
        ctx.stroke();

        ctx.fillStyle = "#ffffff";
        ctx.font = "14px Arial";
        ctx.fillText(smoothDistance.toFixed(1) + " cm", objectX + 12, objectY);
      }

      ctx.fillStyle = "#ffffff";
      ctx.font = "16px Arial";

      const distanceText =
        smoothDistance >= 0
          ? smoothDistance.toFixed(1) + " cm"
          : "No Object";

      ctx.fillText(
        "Angle: " + Math.round(targetAngle) + "°    Distance: " + distanceText,
        14,
        24
      );
    }

    function updateTableSlowly() {
      const now = Date.now();

      if (lastTableData && now - lastTableUpdate > 700) {
        addTableRow(
          lastTableData.angle,
          lastTableData.distance,
          lastTableData.status
        );

        lastTableUpdate = now;
        lastTableData = null;
      }
    }

    function animate() {
      drawRadar();
      updateTableSlowly();
      requestAnimationFrame(animate);
    }

    function map(value, inMin, inMax, outMin, outMax) {
      return (value - inMin) * (outMax - outMin) /
             (inMax - inMin) + outMin;
    }

    resizeCanvas();
    animate();
  </script>

</body>
</html>
